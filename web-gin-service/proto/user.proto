syntax = "proto3";
package user;
option go_package = "logic-grpc-service/proto/gen/user";

message GetProfileReq {
    int64 user_id = 1;
}
message GetProfileResp {
    int64  user_id    = 1;
    string username   = 2;
    string role       = 3;
    string real_name  = 4;
    string phone      = 5;
    string education  = 6;
    string school     = 7;
    string experience = 8;
    string skills     = 9;
}

message UpdateProfileReq {
    int64  user_id    = 1;
    string real_name  = 2;
    string phone      = 3;
    string education  = 4;
    string school     = 5;
    string experience = 6;
    string skills     = 7;
}
message UpdateProfileResp {
    bool   success = 1;
    string message = 2;
}

service UserService {
    rpc GetProfile(GetProfileReq) returns (GetProfileResp);
    rpc UpdateProfile(UpdateProfileReq) returns (UpdateProfileResp);
}